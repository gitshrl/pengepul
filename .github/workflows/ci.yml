name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        run: python -m pip install uv==0.8.22

      - name: install dependencies
        run: uv sync --locked --extra dev

      - name: run pre-push hooks
        run: .venv/bin/pre-commit run --hook-stage pre-push --all-files

      - name: build docker image
        run: docker build -t pengepul:ci .
