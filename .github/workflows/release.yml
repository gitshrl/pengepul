name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: set up rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: check tag matches Cargo version
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(cargo pkgid --locked | sed 's/.*[@#]//')"
          tag="${TAG#v}"
          echo "Cargo version: ${version}"
          echo "Tag version: ${tag}"
          test "${version}" = "${tag}"

      - name: check formatting
        run: cargo fmt --check

      - name: run tests
        run: cargo test --locked

      - name: run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  build:
    name: build ${{ matrix.name }}
    needs: checks
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # musl, so the Linux binary is static and runs on any distro rather
          # than pinning whatever glibc the runner happens to ship.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: pengepul-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            name: pengepul-macos-arm64

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      # Pinned to match rust-toolchain.toml: the target has to be installed for
      # the same toolchain cargo will actually select.
      - name: set up rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      # The rustls stack pulls in ring, which compiles C, so musl needs its own
      # C compiler.
      - name: install musl toolchain
        if: endsWith(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: package archive
        run: tar czf ${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release pengepul

      - name: upload release asset
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Full history, so the previous tag can be found for the changelog link.
      - name: checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: download release assets
        uses: actions/download-artifact@v8.0.1
        with:
          merge-multiple: true

      - name: checksums
        run: sha256sum *.tar.gz > checksums.txt

      - name: publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          previous="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "${previous}" ]; then
            link="https://github.com/${GITHUB_REPOSITORY}/compare/${previous}...${GITHUB_REF_NAME}"
          else
            link="https://github.com/${GITHUB_REPOSITORY}/commits/${GITHUB_REF_NAME}"
          fi
          notes="**Full Changelog**: ${link}"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes "${notes}"
            gh release upload "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber \
              *.tar.gz checksums.txt
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --notes "${notes}" \
              --verify-tag \
              *.tar.gz checksums.txt
          fi
