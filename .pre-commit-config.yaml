repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: ruff-format-check
        name: ruff format check
        entry: .venv/bin/ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: compileall
        name: compile python
        entry: .venv/bin/python -m compileall pengepul tests
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
