repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --check
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: cargo-test
        name: cargo test
        entry: cargo test --locked
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --locked --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        stages: [pre-push]
